name: Codeflash

on:
  pull_request:
    paths:
      # So that this workflow only runs when code within the target module is modified
      - '**'
  workflow_dispatch:

concurrency:
  # Any new push to the PR will cancel the previous run, so that only the latest code is optimized
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  optimize:
    name: Optimize new Python code
    # Don't run codeflash on codeflash-ai[bot] commits, prevent duplicate optimizations
    if: ${{ github.actor != 'codeflash-ai[bot]' }}
    runs-on: ubuntu-latest
    env:
      CODEFLASH_API_KEY: ${{ secrets.CODEFLASH_API_KEY }}
    
    steps:
        - name: Checkout
        uses: actions/checkout@v4
        with:
        fetch-depth: 0
        - name: Set up Python
        uses: actions/setup-python@v4
        with:
        python-version: '3.11'
        cache: 'pip'
        - name: Cache pip
        uses: actions/cache@v4
        with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('uv.lock') }}
        restore-keys: |
        ${{ runner.os }}-pip-
        - name: Install system packages
        run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libpq-dev libsqlite3-dev
        - name: Install build tooling and project dependencies
        run: |
        python -m pip install --upgrade pip setuptools wheel
        # install the package (will use pyproject build system uv_build)
        python -m pip install --no-cache-dir .
        # install dev/test dependencies required by CI
      - name: ⚡️Codeflash Optimization
        run: uv run codeflash